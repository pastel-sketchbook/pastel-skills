name: ps-nose-dedup-eval
description: Evaluation suite for ps-nose-dedup skill
skill: ps-nose-dedup
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-opus-4.6
graders:
  - type: text
    name: nose_workflow_present
    config:
      contains:
        - "nose"
        - "query"
      regex_match:
        - "(?i)(duplicat|dedup|copy.paste|extract|helper)"
  - type: text
    name: nose_commands_used
    config:
      regex_match:
        - "nose query \\."
        - "id=[a-f0-9]+"
  - type: trigger
    name: positive_trigger_check
    config:
      skill_path: ps-nose-dedup
      mode: positive
      threshold: 0.5
  - type: trigger
    name: negative_trigger_check
    config:
      skill_path: ps-nose-dedup
      mode: negative
      threshold: 0.6
  - type: text
    name: no_wrong_skill
    config:
      not_contains:
        - "here are some general linting tips"
        - "run clippy"
      regex_not_match:
        - "(?i)(scaffold|axum|tonic|ratatui|grpc)"
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.75
tasks:
  - "tasks/*.yaml"
