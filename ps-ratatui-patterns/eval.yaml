name: ps-ratatui-patterns-eval
description: Evaluation suite for ps-ratatui-patterns skill
skill: ps-ratatui-patterns
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-opus-4.6
graders:
  - type: trigger
    name: positive_trigger
    config:
      skill_path: ps-ratatui-patterns
      mode: positive
      threshold: 0.6
  - type: trigger
    name: negative_trigger
    config:
      skill_path: ps-ratatui-patterns
      mode: negative
      threshold: 0.6
  - type: text
    name: mentions_ratatui
    config:
      regex_match:
        - "(?i)ratatui|terminal|tui"
  - type: text
    name: no_panic
    config:
      regex_not_match:
        - "(?i)panic|todo!|unimplemented!"
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.75
tasks:
  - "tasks/*.yaml"
